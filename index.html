<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moi-Kursi: Мои видеокурсы</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Шапка -->
        <header class="header">
            <div class="header-content">
                <h1 class="logo">📚 Moi-Kursi</h1>
                <p class="tagline">Личная платформа видеокурсов</p>
            </div>
        </header>

        <!-- Основной контент -->
        <main class="main">
            <!-- Поиск и фильтры -->
            <div class="search-section">
                <input
                    type="text"
                    id="searchInput"
                    class="search-input"
                    placeholder="Поиск курса, раздела или урока..."
                    autocomplete="off"
                >
                <button id="clearSearchBtn" class="btn-clear" style="display:none;">✕ Очистить</button>
            </div>

            <div class="content-wrapper">
                <!-- Левая панель: список курсов -->
                <aside class="sidebar">
                    <h2 class="sidebar-title">Курсы</h2>
                    <div id="coursesList" class="courses-list">
                        <div class="loading">Загрузка курсов...</div>
                    </div>
                </aside>

                <!-- Основной контент -->
                <section class="content">
                    <!-- Загрузка -->
                    <div id="loadingIndicator" class="loading" style="display:none;">
                        Загрузка...
                    </div>

                    <!-- Никакой курс не выбран -->
                    <div id="noCourseSelected" class="empty-state">
                        <p class="empty-icon">👈</p>
                        <p>Выбери курс слева</p>
                    </div>

                    <!-- Информация о курсе -->
                    <div id="courseInfo" style="display:none;">
                        <div class="breadcrumb" id="breadcrumb"></div>
                        <h2 id="courseTitle" class="course-title"></h2>
                        <p id="courseDescription" class="course-description"></p>

                        <!-- Разделы и уроки -->
                        <div id="sectionsContainer" class="sections-container"></div>
                    </div>

                    <!-- Просмотр видео -->
                    <div id="videoViewer" style="display:none;">
                        <div class="video-container">
                            <video id="videoPlayer" class="video-player" controls>
                                <source id="videoSource" type="video/mp4">
                                Ваш браузер не поддерживает видео.
                            </video>
                        </div>
                        <div class="lesson-info">
                            <div class="breadcrumb" id="lessonBreadcrumb"></div>
                            <h2 id="lessonTitle" class="lesson-title"></h2>
                            <p id="lessonDescription" class="lesson-description"></p>
                            <button id="backToSectionBtn" class="btn btn-secondary">← Назад к разделу</button>
                        </div>
                    </div>
                </section>
            </div>
        </main>

        <!-- Подвал -->
        <footer class="footer">
            <p>&copy; 2026 Moi-Kursi. Личная платформа видеокурсов.</p>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
